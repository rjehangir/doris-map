name: doris-tracker
services:
  - name: api
    github:
      repo: <your-github-org>/SolarSurfer2-cloud
      branch: doris-tracker
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "8000"
    routes:
      - path: /
